name: Scrape IPO data

# Fetches GLOBAL IPOs (SEC EDGAR US + HKEX) every 30 minutes, commits any changes,
# and pings the Vercel deploy hook so the site rebuilds with fresh data.
#
# India is Google-Sheets-only (no scraper) — GMP is fetched live at runtime, so it
# does not need this workflow.
on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
  workflow_dispatch: {}

# Allow the workflow to push the updated data file back to the repo.
permissions:
  contents: write

# Never run two scrapes at once.
concurrency:
  group: scrape-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Scrape global IPOs (SEC + HKEX)
        run: python scripts/scrape-global.py

      - name: Commit data changes
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            # [skip ci] prevents this bot commit from re-triggering workflows.
            git commit -m "chore: update global IPO data [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Vercel redeploy
        if: steps.commit.outputs.changed == 'true' && env.VERCEL_DEPLOY_HOOK != ''
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
